<footer>
    <div class="container footer-inner">
        <div class="footer-logo-section">
            <a href="/" class="logo">
                {{ $logo := resources.Get "images/logo.png" }}
                {{ if $logo }}
                    <img src="{{ $logo.RelPermalink }}" alt="Open Traceability Logo">
                {{ end }}
                <span>OPEN TRACEABILITY</span>
            </a>
            <p>© 2026. Released under CC BY 4.0.</p>
        </div>
        <div style="display: flex; gap: 24px;">
            <a href="https://github.com/opensustain/open-traceability" style="color: var(--color-text-secondary); text-decoration: none;">GitHub</a>
            <a href="https://bsky.app" style="color: var(--color-text-secondary); text-decoration: none;">Bluesky</a>
            <a href="/privacy" style="color: var(--color-text-secondary); text-decoration: none;">Privacy</a>
        </div>
    </div>
</footer>
