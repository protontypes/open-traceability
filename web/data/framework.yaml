title: "The Six Dimensions of Openness"
subtitle: "Breaking the knowledge-creation process into inspectable layers."
dimensions:
  - id: "01 · Data"
    title: "Open Raw Data"
    description: "Inputs are verifiable, identifiable, documented, attributable, and ideally versioned."
  - id: "02 · Logic"
    title: "Open Models"
    description: "Analytical logic is visible through code, methods, dependencies, and open licenses."
  - id: "03 · Run"
    title: "Open Execution"
    description: "Workflows and provenance make the path from inputs to outputs externally inspectable."
  - id: "04 · Critique"
    title: "Open Review"
    description: "Visible issue tracking and responses to challenge show how claims were tested."
  - id: "05 · Access"
    title: "Open Publications"
    description: "Final reports and policy outputs are accessible and clearly documented for scrutiny."
  - id: "06 · Connection"
    title: "Linkage Quality"
    description: "<strong>The Decisive Factor.</strong> Explicit and verifiable connections across the entire artifact chain."
    highlight: true
